                                <div class="ql-snow next-16ul55f e1hv24360">
                                    <div class="ql-editor">
                                        <p class="ql-align-justify"><strong><em>Що спільного між сайтом та авто?</em></strong></p>
                                        <p class="ql-align-justify"><em>Багато людей щодня користуються автомобілем — як пасажири або
                                                водії. Але далеко не всі знають принцип роботи двигуна або системи безпеки. Це вже сфера
                                                автомеханіків.</em></p>
                                        <p class="ql-align-justify"><em>Сайти так само мають “під капотом” багато того, що звичайний
                                                користувач не бачить. Але ти — майбутній розробник. Отже, почнемо зі знайомства з
                                                веб-технологіями, які користуються найбільшим попитом.</em></p>
                                        <p class="ql-align-justify"><br></p>
                                        <p class="ql-align-justify"><em>﻿</em></p>
                                        <p class="ql-align-justify"><strong class="ql-size-large">Веб-технології HTML, CSS, JS</strong>
                                        </p>
                                        <p class="ql-align-justify"><br></p>
                                        <p class="ql-align-justify">Вебсайти – це основа, на якій тримається інтернет. І всі вони
                                            побудовані на трьох основних технологіях. Використання однієї технології не виключає всіх
                                            інших. Навпаки, вони зазвичай використовуються разом.&nbsp;</p>
                                        <p class="ql-align-justify"><br></p>
                                        <ul>
                                            <li class="ql-align-justify"><strong>HTML</strong>&nbsp;— відповідає за наповнення
                                                веб-сторінки контентом, а також за її структуру та вміст. Це, наприклад, статті,
                                                світлини та відео розміщені на сайтах.&nbsp;</li>
                                            <li class="ql-align-justify"><strong>CSS</strong>&nbsp;&nbsp;— використовується для
                                                оформлення та позиціонування елементів сторінки, тобто забезпечення її зовнішнього
                                                вигляду. Отже, розробник має знати CSS, щоб додавати різні шрифти, фон, або спеціальні
                                                ефекти для окремих блоків.</li>
                                            <li class="ql-align-justify"><strong>JavaScript</strong>&nbsp;— дозволяє додавати функціонал
                                                чи реакцію на дії користувача. Це вже не про ефекти, зміни кольору при наведенні на
                                                кнопку, а про функціональну фічу на сайті: наприклад, користувач заповнює форму
                                                реєстрації тощо.</li>
                                        </ul>

                                <div class="ql-snow next-16ul55f e1hv24360">
                                    <div class="ql-editor">
                                        <p class="ql-align-justify"><strong class="ql-size-large">Інструменти розробника</strong></p>
                                        <p class="ql-align-justify"><br></p>
                                        <p class="ql-align-justify">Розробники можуть подивитися, як влаштовані сайти, на які вони
                                            заходять.</p>
                                        <p class="ql-align-justify"><br></p>
                                        <p class="ql-align-justify"><strong>Інструменти розробника</strong> — вбудований функціонал
                                            браузера, який дозволяє отримувати інформацію про вихідний код сторінки, стилі, мережеві
                                            запити та багато іншого.</p>
                                        <p class="ql-align-justify"><br></p>
                                        <pre class="ql-blockquote" spellcheck="false">Інструменти розробника можна викликати такими способами. 
                                    — Комбінацією клавіш <strong>Ctrl+Shift+I</strong> для Windows 
                                    — Комбінацією клавіш <strong>Cmd+Opt+I </strong>для MacOS 
                                    — На веб-сторінці натиснути правою клавішею миші та вибрати пункт меню «Переглянути код» — остання опція у випадаючому списку.&nbsp;
                                    </pre>
                                        <p class="ql-align-justify"><br></p>
                                        <div class="ql-custom-image" contenteditable="false" align="center"
                                            data-blot-name="custom-image" data-id="xlrqs"

                                            <div class="next-1bk4wn6 e11xll1g1"><img class="ql-custom-image" id="xlrqs"

                                        </div>
                                        <p class="ql-align-justify"><br></p>
                                        <p class="ql-align-justify">За замовчуванням в інструментах розробника відкривається вкладка
                                            <code>Elements</code>. У ній представлено внутрішню HTML-структуру документа. При наведенні
                                            курсору миші на певний елемент він буде підсвічуватися у вікні браузера (viewport).
                                        </p>
                                        <p class="ql-align-justify"><br></p>
                                        <p class="ql-align-justify">Вкладка <code>Styles</code> демонструє стильові налаштування
                                            сторінки: колір фону, відступи тощо.</p>
                                        <p class="ql-align-justify"><br></p>
                                        <p class="ql-align-justify">Ми будемо повертатися до інструментів розробника на різних етапах
                                            навчання. А зараз можеш заглянути "під капот" свого улюбленого сайту.</p>

                                <div class="ql-snow next-16ul55f e1hv24360">
                                    <div class="ql-editor">
                                        <p><strong class="ql-size-large">Що таке мова HTML?</strong></p>
                                        <p><br></p>
                                        <p><strong>HyperText Markup Language</strong> (мова розмітки гіпертексту) — мова розмітки
                                            веб-документів. Набір правил структурування (розмітки) текстової інформації, додавання
                                            зображень, створення таблиць, форм, списків тощо.</p>
                                        <p><br></p>
                                        <p><strong>HTML-документ</strong> — текстовий файл з розширенням <code>.html</code>.</p>
                                        <p><br></p>
                                        <p>Документ, розмічений за допомогою HTML, інтерпретується браузером. Як результат, користувачі
                                            бачать не вихідний код з елементами розмітки, а результат обробки цього файлу —
                                            веб-сторінку.</p>
                                        <p><br></p>

                                        </div>
                                        <p><br></p>
                                        <p>Популярність HTML та використання її як основи веб-сторінок призвело до необхідності
                                            створення, підтримки та розвитку відповідних стандартів. Зараз цим займається <a
                                                href="https://whatwg.org/" rel="noopener noreferrer" target="_blank">Web Hypertext
                                                Application Technology Working Group (WHATWG)</a>, яка працює над специфікацією <a
                                                href="https://html.spec.whatwg.org/multipage/" rel="noopener noreferrer"
                                                target="_blank">HTML Living Standard</a>.</p>
                                        <p><br></p>
                                        <pre class="ql-blockquote" spellcheck="false">Наразі ви бачите відображення вмісту HTML-документа у браузері. Цей інтерактивний лонгрід — це сторінка, розмічена HTML.
                                    </pre>

                                        <p><strong>Тег (tag)</strong>&nbsp;— елемент мови розмітки гіпертексту. Теги є найменшими
                                            будівельними блоками, з яких складається будь-яка веб-сторінка. Кожен тег позначає окрему
                                            сутність: заголовок, список, абзац тексту, зображення. Для виділення тегів у тексті
                                            документа використовуються кутові дужки, у яких вказується ім'я тегу та його атрибути.</p>

                </pre><button class="copy"></button>
                                        </div>
                                        <p><br></p>
                                        <p>Відкриваючий тег вказує на початок елементу, закриваючий — на його закінчення. Закриваючий
                                            тег утворюється шляхом додавання слешу (<code>/</code>) перед ім'ям тегу. Між відкриваючим
                                            та закриваючим тегами знаходиться контент тегу.</p>

                                        <p><em>Опис рецепту є, а назви — нема! Треба обов’язково додати заголовок. Адже користувачі

                                        <p><br></p>

                                        <p><strong class="ql-size-large">Тег заголовка</strong></p>
                                        <p><br></p>
                                        <p>Заголовок є інструментом структурування текстового вмісту сторінки. Для того, щоб додати
                                            найважливіший заголовок, що описує весь вміст сторінки, використовується тег <code
                                                style="background-color: rgba(135, 131, 120, 0.15);">&lt;h1&gt;</code> — заголовок
                                            першого рівня. На практиці тег&nbsp;<code
                                                style="background-color: rgba(135, 131, 120, 0.15);">&lt;h1&gt;</code> використовується
                                            лише один раз як основний заголовок сторінки.</p>

                <span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>

                <span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>

                                        </div>
                                        <p><br></p>
                                        <pre class="ql-blockquote" spellcheck="false"><strong>﻿Оформлення коду</strong> 
                У фрагменті коду вище ти можеш побачити кілька прикладів коректного його оформлення. 
                Але запам’ятай основне:
                — кожен тег починається з нового рядка; 
                — якщо контент займає кілька рядків, відкриваючий та закриваючий теги розташовані один під одним (див. абзац); 
                — якщо контент займає один рядок, відкриваючий та закриваючий теги розташовані безпосередньо до та після контенту (див. заголовок).

                                style="min-height: auto;">
                                <div class="ql-snow next-16ul55f e1hv24360">
                                    <div class="ql-editor">
                                        <p><em>Адмін платформи каже треба обов’язково додати посилання на профіль автора рецепту.</em>
                                        </p>
                                        <p><br></p>
                                        <p><br></p>
                                        <p><strong class="ql-size-large">Атрибути: тег посилання </strong><code
                                                class="ql-size-large"><strong>&lt;a&gt;</strong></code><strong class="ql-size-large"> та
                                                його атрибут </strong><code class="ql-size-large"><strong>href</strong></code></p>
                                        <p><br></p>
                                        <p><strong>Атрибути </strong>— це додаткові налаштування тегів, за допомогою яких можна
                                            змінювати властивості та поведінку елементу. Теги можуть мати обов'язкові та необов'язкові
                                            атрибути. Їх може бути декілька або зовсім не бути.</p>
                                        <p><br></p>
                                        <p>Атрибути записуються всередині відкриваючого тегу, а їх значення вказуються всередині
                                            подвійних лапок. Декілька атрибутів розділяються пробілом.</p>
                                        <p><br></p>
                                        <div class="ql-syntax-block">
                                            <pre class="ql-syntax hljs language-routeros" spellcheck="false" data-highlighted="yes">&lt;a <span class="hljs-attribute">href</span>=<span class="hljs-string">"https://google.com"</span> <span class="hljs-attribute">class</span>=<span class="hljs-string">"link"</span>&gt;...&lt;/a&gt;
                &lt;img <span class="hljs-attribute">src</span>=<span class="hljs-string">"cat.jpg"</span> <span class="hljs-attribute">alt</span>=<span class="hljs-string">"cute cat"</span> /&gt;
                &lt;input <span class="hljs-attribute">type</span>=<span class="hljs-string">"text"</span> <span class="hljs-attribute">name</span>=<span class="hljs-string">"user_name"</span> /&gt;
                &lt;button <span class="hljs-attribute">type</span>=<span class="hljs-string">"submit"</span>&gt;...&lt;/button&gt;
                </pre><button class="copy"></button>
                                        </div>
                                        <p><br></p>
                                        <pre class="ql-blockquote" spellcheck="false">Корисно! 
                Для того, щоб дізнатися які атрибути доступні для тегу та призначення атрибутів, можна зайти в документацію або довідник, наприклад <a href="http://htmlreference.io/" rel="noopener noreferrer" target="_blank">htmlreference.io</a>
                </pre>
                                        <p><br></p>
                                        <p>Давай розглянемо структуру тегу з атрибутами на прикладі тегу <code
                                                style="background-color: rgba(135, 131, 120, 0.15);">&lt;a&gt;</code> . Він призначений
                                            для створення посилань або тексту. Клікаючи по ньому, ми переходимо на іншу сторінку,
                                            завантажуємо файл тощо. Текст посилання відображається в браузері з підкресленням синім
                                            шрифтом. При наведенні на посилання курсор миші змінює вигляд.</p>
                                        <p><br></p>
                                        <div class="ql-custom-image" contenteditable="false" align="center"
                                            data-blot-name="custom-image" data-id="n9vvl"
                                            data-src="https://s3.eu-north-1.amazonaws.com/lms.goit.files/f8859b1b-5eff-4ebb-8939-a9a5d941378eFrame%2047552%20%287%29.png"
                                            data-width="300px" data-height="auto">
                                            <div class="next-1bk4wn6 e11xll1g1"><img class="ql-custom-image" id="n9vvl"

                                        </div>
                                        <p><br></p>
                                        <p>Адреса посилання задається в обов'язковому атрибуті <code
                                                style="background-color: rgba(135, 131, 120, 0.15);">href="адреса"</code>, де адреса —
                                            це URL, що вказує на сторінку, файл або будь-який ресурс.&nbsp;</p>
                                        <p><br></p>
                                        <div class="ql-syntax-block">
                                            <pre class="ql-syntax hljs language-xml" spellcheck="false" data-highlighted="yes"><span class="hljs-tag">&lt;<span class="hljs-name">a</span> <span class="hljs-attr">href</span>=<span class="hljs-string">"https://google.com"</span>&gt;</span>Посилання на головну сторінку Google<span class="hljs-tag">&lt;/<span class="hljs-name">a</span>&gt;</span>
                </pre><button class="copy"></button>
                                        </div>
                                        <p><br></p>
                                        <p>URL (скорочення від Uniform Resource Locator<em>)</em> — унікальна сукупність символів, в
                                            якій відображається шлях до сторінки інтернет-ресурсу, наприклад <a
                                                href="https://goit.global/" rel="noopener noreferrer"
                                                target="_blank">https://goit.global/</a>.</p>
                                        <p><br></p>
                                        <pre class="ql-blockquote" spellcheck="false"><strong>Запам’ятай основні характеристики атрибутів: </strong>
                — Атрибути змінюють або надають додаткові властивості тегам. 
                — Кілька атрибутів у тегу відокремлюються за допомогою пробілу. 
                — Атрибути та їх значення містяться всередені відкриваючого тегу. 
                — Знак “=” ставиться між атрибутом та його значенням.&nbsp;
                </pre>

                                style="min-height: auto;">
                                <div class="ql-snow next-16ul55f e1hv24360">
                                    <div class="ql-editor">
                                        <p><em>Як би викласти на сайт фото страви?</em></p>
                                        <p><em>Дивишся, й відразу зрозуміло — смакота.</em></p>
                                        <p><br></p>
                                        <p><br></p>
                                        <p><strong class="ql-size-large">Тег </strong><code
                                                class="ql-size-large"><strong>&lt;img&gt;</strong></code><strong class="ql-size-large">
                                                і його атрибут </strong><code class="ql-size-large"><strong>src</strong></code></p>
                                        <p><br></p>
                                        <p>Використання графіки робить веб-сторінки візуально привабливими. Зображення допомагають краще
                                            передати суть та зміст документа.</p>
                                        <p><br></p>
                                        <p><strong>Растрова графіка (raster, bitmap)</strong> — опис графічного файлу у вигляді масиву з
                                            координатами кожного пікселя і описом кольору цього пікселя. Це як мапа кольорів з
                                            фіксованим розміром.</p>
                                        <p><br></p>
                                        <p>Два формати зображень, що найбільш широко використовуються:</p>
                                        <ul>
                                            <li><strong>JPEG</strong> — великі файли, що не потребують прозорого фону або анімації. Цей
                                                формат ідеальний для яскравих реалістичних фотографій, оскільки вони можуть містити
                                                мільйони кольорів.</li>
                                            <li><strong>PNG</strong> — на відміну від JPEG, підходить для зображень, фон яких має бути
                                                прозорим або одноколірним. Використовується для іконок та декоративних елементів. Також
                                                цей формат використовується для зображень підвищеної точності: скріншотів, креслень,
                                                графіків тощо.</li>
                                        </ul>
                                        <p><br></p>
                                        <p>Тег&nbsp;<code>&lt;img&gt;</code> призначений для розмітки зображень у різних графічних
                                            форматах.</p>
                                        <p><br></p>
                                        <div class="ql-syntax-block">
                                            <pre class="ql-syntax hljs language-stylus" spellcheck="false" data-highlighted="yes">&lt;<span class="hljs-selector-tag">img</span> <span class="hljs-attribute">src</span>=<span class="hljs-string">"https://images.pexels.com/photos/67112/pexels-photo-67112.jpeg"</span> /&gt;
                </pre><button class="copy"></button>
                                        </div>
                                        <p><br></p>
                                        <p>Щоб задати адресу зображення, використовується обов'язковий атрибут <code>src="шлях"</code>.
                                        </p>
                                    </div>

                                    <div class="ql-editor">
                                        <p><strong class="ql-size-large">Парні та одиночні теги</strong></p>
                                        <p><br></p>
                                        <p>У минулому кроці ми додали зображення, і ви могли помітити, що тег <code>&lt;img&gt;</code>
                                            відрізняється синтаксично від усіх попередніх. Тег <code>&lt;img&gt;</code> одиночний, тобто
                                            не вимагає однойменного закриваючого тегу.</p>
                                        <p><br></p>
                                        <p>Парні теги:</p>
                                        <ul>
                                            <li>складаються з відкриваючого і закриваючого тегів;</li>
                                            <li>відкриваючий та закриваючий теги огортають текстовий вміст;</li>
                                            <li>дозволяють групувати контент за змістом та вмістом;</li>
                                            <li>всередині парних тегів можуть бути вкладені інші теги.</li>
                                        </ul>
                                        <p><br></p>
                                        <p>Тему вкладеності більш детально розглянемо пізніше.</p>
                                        <p><br></p>
                                        <div class="ql-syntax-block">
                                            <pre class="ql-syntax hljs language-xml" spellcheck="false" data-highlighted="yes"><span class="hljs-comment">&lt;!-- Стаття із заголовком та абзацом --&gt;</span>
                <span class="hljs-tag">&lt;<span class="hljs-name">article</span>&gt;</span>
                	<span class="hljs-tag">&lt;<span class="hljs-name">h1</span>&gt;</span>Коротко про парні теги<span class="hljs-tag">&lt;/<span class="hljs-name">h1</span>&gt;</span>
                	<span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>
                      Більшість тегів парні. Їх контент міститься між 
                      відкриваючим та закриваючим тегами.
                    <span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>
                <span class="hljs-tag">&lt;/<span class="hljs-name">article</span>&gt;</span>
                </pre><button class="copy"></button>
                                        </div>
                                        <p><br></p>
                                        <p>Одиночні теги:</p>
                                        <ul>
                                            <li>складаються тільки з відкриваючого тегу;</li>
                                            <li>не містять текстового вмісту;</li>
                                            <li>отримують вміст або поведінку з атрибутів;</li>
                                            <li>служать для зміни властивостей документа, підключення файлів тощо.</li>
                                        </ul>
                                        <p><br></p>
                                        <p>Тег <code>&lt;img&gt;</code> один із таких тегів, його вміст вказується в атрибуті
                                            <code>src</code>.</p>
                                        <p><br></p>
                                        <div class="ql-syntax-block">
                                            <pre class="ql-syntax hljs language-xml" spellcheck="false" data-highlighted="yes"><span class="hljs-comment">&lt;!-- Метаінформація про кодування --&gt;</span>
                <span class="hljs-tag">&lt;<span class="hljs-name">meta</span> <span class="hljs-attr">charset</span>=<span class="hljs-string">"utf-8"</span> /&gt;</span>
                <span class="hljs-comment">&lt;!-- Поле вводу --&gt;</span>
                <span class="hljs-tag">&lt;<span class="hljs-name">input</span> <span class="hljs-attr">type</span>=<span class="hljs-string">"text"</span> /&gt;</span>
                <span class="hljs-comment">&lt;!-- Зображення --&gt;</span>
                <span class="hljs-tag">&lt;<span class="hljs-name">img</span> <span class="hljs-attr">src</span>=<span class="hljs-string">"cat.jpg"</span> <span class="hljs-attr">alt</span>=<span class="hljs-string">"cool cat"</span> /&gt;</span>
                </pre><button class="copy"></button>

                                                                            <p>Якщо зображення не завантажується, необхідно показати

                                                                            </p>

                                                                                    <code>https://ac.goit.global/fullstack/html-css-v2/module-1/autocheck/pancakes.jpg</code>
                                                                                </li>
                                                                                <li>У тезі <code>&lt;img&gt;</code> є атрибут
                                                                                    <code>alt</code></li>
                                                                                <li>Значення атрибуту <code>alt</code> це

                                        <p><strong class="ql-size-large">Зображення: атрибути width та height</strong></p>
                                        <p><br></p>
                                        <p>За замовчуванням браузер відображає будь-яке зображення (картинки, фото, схеми) в
                                            оригінальному розмірі.</p>
                                        <p><br></p>
                                        <p>Для того щоб змінити розміри картинки, тег <code>&lt;img&gt;</code> має атрибути
                                            <code>width</code>і <code>height</code> . Вони відповідають за ширину і висоту елементу
                                            зображення в браузері. Значення задаються в пікселях, тобто точках на екрані. В коді
                                            вказується лише число, без позначення <code>px</code> (див. приклад нижче).</p>
                                        <p><br></p>
                                        <p>Якщо встановити лише одну величину — ширину або висоту, браузер автоматично обчислить іншу
                                            для збереження пропорцій.</p>
                                        <p><br></p>

                                            <pre class="ql-syntax hljs language-abnf" spellcheck="false" data-highlighted="yes">&lt;img

                  width<span class="hljs-operator">=</span><span class="hljs-string">"400"</span>
                /&gt;
                </pre><button class="copy"></button>

                                            можна буде забрати або замінити.</p>

                                                                            <p>На сайті вже є абзац з загальним описом потрібних

                                                                                сім штук. Кожен інгредієнт має бути представлений
                                                                                елементом списку - тегом <code>&lt;li&gt;</code></p>
                                                                            <pre><code class="language-text">- 2 cups farmer's cheese, homemade
                - 3 large eggs

                - half teaspoon salt
                - 2-3 tablespoons extra light olive oil for each batch
                - fresh fruit, jam, or sour cream for topping
                </code></pre>

                                                                        <div data-tour-step="theory" class="next-11xfif e1mmi4kp0">
                                                                            <p>Окрім списку інгредієнтів треба знати що і в якій
                                                                                послідовності робити, щоб приготувати страву. Ми додали
                                                                                абзац з загальним описом процесу приготування.
                                                                                Твоя задача додати список кроків для приготування
                                                                                страви. Послідовність кроків дуже важлива, тому
                                                                                необхідно використовувати нумерований список.</p>
                                                                            <p>Ось текст кроків, всього шість штук.</p>
                                                                            <pre><code class="language-text">- Beat eggs, salt and sugar together in a bowl until smooth.
                - Add flour and farmer's cheese. Mix well until the dough is thick and sticky.
                - Heat a skillet over medium heat, add 2-3 tablespoon oil.
                - Divide dough into portions, form into balls and coat with some flour. With well-floured hands, flatten slightly to form into discs.
                - Once the oil is hot, place the discs and fry until golden brown, 3-5 minutes each side.
                - Serve with your favorite toppings - jam, sour cream, or fruits and berries.
                </code></pre>
                                                                            <h3 class="test">Критерії виконання завдання</h3>
                                                                            <ul>
                                                                                <li>У коді є тег <code>&lt;ol&gt;</code></li>
                                                                                <li>Тег <code>&lt;ol&gt;</code> знаходиться після абзацу
                                                                                    з описом процесу приготування</li>
                                                                                <li>Всередині тега <code>&lt;ol&gt;</code> є шість тегів
                                                                                    <code>&lt;li&gt;</code></li>
                                                                                <li>Текст всередині тегів <code>&lt;li&gt;</code>
                                                                                    збігається с текстом кроків</li>
                                                                            </ul>

                                        <p>Група тегів від <code>&lt;h1&gt;</code> до <code>&lt;h6&gt;</code> визначає текстові

                                            розташованого після них. Це інструмент структурування текстового контенту.</p>
                                        <p><br></p>

                                                style="background-color: rgb(236, 239, 241);">&lt;h3&gt;</code>, <code
                                                style="background-color: rgb(236, 239, 241);">&lt;h4&gt;</code>, <code
                                                style="background-color: rgb(236, 239, 241);">&lt;h5&gt;</code>, <code
                                                style="background-color: rgb(236, 239, 241);">&lt;h6&gt;</code>) можуть
                                            використовуватися скільки завгодно разів, але їх завжди слід застосовувати правильно,
                                            дотримуючись ієрархії. На сторінці не обов’язково мають бути всі 6 рівнів заголовків.

                            <div data-type="element" data-gtm-event="LMS" data-gtm-event_name="lms_builder_see_element"
                                data-gtm-email="krupa.mykhailo@icloud.com" data-gtm-course_id="17039071" data-gtm-module_id="17039078"
                                data-gtm-block_id="17063508" data-gtm-element_id="15172784" id="15172784" class="next-cdutae e8cwlxb5"
                                style="min-height: auto;">
                                <div class="ql-snow next-16ul55f e1hv24360">
                                    <div class="ql-editor">
                                        <p><em>Рецепт зверстано! І це неабияке досягнення для початку навчання.</em></p>
                                        <p><em>Але виникло питаннячко, чи використовуєш ти принципи семантичної розмітки?</em></p>
                                    </div>
                                </div>
                            </div>
                            <div data-type="element" data-gtm-event="LMS" data-gtm-event_name="lms_builder_see_element"
                                data-gtm-email="krupa.mykhailo@icloud.com" data-gtm-course_id="17039071" data-gtm-module_id="17039078"
                                data-gtm-block_id="17063508" data-gtm-element_id="15172776" id="15172776" class="next-cdutae e8cwlxb5"
                                style="min-height: auto;">
                                <div class="ql-snow next-16ul55f e1hv24360">
                                    <div class="ql-editor">
                                        <p><strong class="ql-size-large">Семантика</strong></p>
                                        <p><br></p>
                                        <p>Розмітка веб-сторінки підпорядковується певним правилам, так само як сторінка газети чи
                                            журналу, де на першій полосі завжди найважливіші теми.</p>
                                        <p><br></p>
                                        <p>Веб-сторінки також містять різні типи контенту: заголовки, списки, зображення, абзаци тексту
                                            тощо. Для опису цієї різноманітності існують відповідні теги: для розмітки абзацу тексту
                                            використовується тег <code>&lt;p&gt;</code>, для розмітки посилань — тег
                                            <code>&lt;a&gt;</code>, тощо. Отже, семантика (тобто <em>призначення тегів</em>) є
                                            невід’ємною частиною HTML вже з базового рівня.</p>
                                        <p><br></p>
                                        <p><strong>Семантична розмітка</strong></p>
                                        <p><br></p>
                                        <p>Семантична розмітка — підхід до створення HTML-розмітки, у якому вибір тегу залежить від:</p>
                                        <p><br></p>
                                        <ul>
                                            <li>призначення тегу, вказаного в специфікації;</li>
                                            <li>типу контенту.</li>
                                        </ul>
                                        <p><br></p>
                                        <p>Окрім ситуацій, коли вибір тегу — це питання здорового глузду (<code>&lt;img&gt;</code> для
                                            зображень), є більш складні випадки. Уяви, що два розробника використали різні підходи, щоб
                                            додати розділ меню на сторінку ресторану.</p>
                                        <p><br></p>
                                        <div class="ql-syntax-block">
                                            <pre class="ql-syntax hljs language-xml" spellcheck="false" data-highlighted="yes"><span class="hljs-comment">&lt;!-- Розробник Петро --&gt;</span> 
                
                <span class="hljs-tag">&lt;<span class="hljs-name">h3</span>&gt;</span>Страви від шефа<span class="hljs-tag">&lt;/<span class="hljs-name">h3</span>&gt;</span>
                <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>
                  Поєднання найсвіжіших локальних 
                  продуктів і авторського бачення.
                <span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>
                <span class="hljs-tag">&lt;<span class="hljs-name">ul</span>&gt;</span>
                    <span class="hljs-tag">&lt;<span class="hljs-name">li</span>&gt;</span>Крем-суп із гарбуза<span class="hljs-tag">&lt;/<span class="hljs-name">li</span>&gt;</span>
                    <span class="hljs-tag">&lt;<span class="hljs-name">li</span>&gt;</span>Телятина на пательні<span class="hljs-tag">&lt;/<span class="hljs-name">li</span>&gt;</span>
                <span class="hljs-tag">&lt;/<span class="hljs-name">ul</span>&gt;</span>
                
                
                
                <span class="hljs-comment">&lt;!-- Розробник Матвій--&gt;</span> 
                
                <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>Страви від шефа<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>
                <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>
                  Поєднання найсвіжіших локальних 
                  продуктів і авторського бачення.
                <span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>
                <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>Крем-суп із гарбуза<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>
                <span class="hljs-tag">&lt;<span class="hljs-name">p</span>&gt;</span>Телятина на пательні<span class="hljs-tag">&lt;/<span class="hljs-name">p</span>&gt;</span>
                </pre><button class="copy"></button>
                                        </div>
                                        <p><br></p>
                                        <p>Петро подивився, що на сторінці є назва ресторану <code>&lt;h1&gt;</code>, меню
                                            <code>&lt;h2&gt;</code> та акції <code>&lt;h2&gt;</code>. Різні позиції меню, типу <em>Перші
                                                страви, Десерти,</em> зверстані через <code>&lt;h3&gt;</code>. Петро проаналізував тип
                                            контенту та призначення тегів і додав розділ із заголовком <em>Страви від шефа</em> з тегом
                                            <code>&lt;h3&gt;</code>. А страви зверстав списком. Це приклад семантичної розмітки.</p>
                                        <p><br></p>
                                        <p>Матвій обрав теги на основі того, як вони відображаються в браузері: короткий абзац з назвою,
                                            ще один з описом та ще 3 зі стравами. І його сторінка також працює. Але замовник не
                                            задоволений.</p>
                                        <p><br></p>
                                        <p><strong>В чому переваги семантичної розмітки?</strong></p>
                                        <p><br></p>
                                        <p>Семантична розмітка надважлива при створенні сайту.</p>
                                        <p><br></p>
                                        <ul>
                                            <li><strong>Для просування сайту у пошукових системах.</strong></li>
                                        </ul>
                                        <p>Наявність семантичної розмітки сторінок допомагає пошуковим роботам краще розуміти, що
                                            знаходиться на сторінці, і в залежності від цього ранжувати сайти в пошуковій видачі.</p>
                                        <p><br></p>
                                        <ul>
                                            <li><strong>Для коректної роботи асистивних технологій</strong></li>
                                        </ul>
                                        <p>Для користувачів з вадами зору основним інструментом знайомства з контентом є скрінрідер, що
                                            зачитує вміст сторінки. Семантична розмітка допомагає скрінрідеру коректно визначати який
                                            блок треба озвучити, а користувачу краще розуміти вміст.</p>
                                        <p><br></p>
                                        <ul>
                                            <li><strong>Для кращої читабельності коду</strong></li>
                                        </ul>
                                        <p>Для інших розробників в команді та для тебе самого через декілька місяців чи літ важливо
                                            швидко розуміти структуру коду. Семантична розмітка — один із шляхів цього досягти.</p>
                                    </div>
                                </div>

                                    <div class="ql-editor">
                                        <p><strong class="ql-size-large">Оформлення коду: теги</strong></p>
                                        <p><br></p>
                                        <p>У процесі створення веб-сайтів завжди необхідно повертатися до вже написаного коду для
                                            внесення змін. Зазвичай над проєктом працюють кілька розробників, а не один. Якщо код не
                                            оформлений відповідно до стандартів, він втрачає читабельність і, як наслідок, швидкість
                                            розробки падає.</p>
                                        <p><br></p>
                                        <p>Ти вже зіткнувся з деякими стандартами оформлення коду. Давай підсумуємо, що ти маєш знати
                                            станом на цей час.</p>

                                        </ul>
                                        <p><br></p>
                                        <div class="ql-syntax-block">
                                            <pre class="ql-syntax hljs language-xml" spellcheck="false" data-highlighted="yes">❌
